    <style>

</head>
<body>
    <h1 id="calc"> </h1>
    <form onsubmit="factorial(event)">
        <label for="formv"> Give me a number:</label>
        <input type="number" id="formv" name="formv">
            <button onsubmit="factorial"> Submit</button>

    </form>



<script>


function factorial(event){
    event.preventDefault()
    let formData = new FormData(event.target);
    let num = formData.get("formv");
    let total = 1;
    let i = 1;
    while (i <= num){
        total = total * i;
        i = i + 1;
    }
document.getElementById("calc").innerHTML = total;
}


</script>

</body>
