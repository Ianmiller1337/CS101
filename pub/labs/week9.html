<body>
    <h1 id="X">10</h1>

    <button onclick="increment(1)">increment</button>
    <button onclick="square( counter * counter)">square</button>
   
    <script>
    let counter= 10 ;

function increment(to_add){
    
    counter = counter + to_add;
    document.getElementById("X").innerHTML = counter;
}

function square(to_add){
    counter = counter * counter;
    document.getElementById("X").innerHTML = counter;

}


</script>
